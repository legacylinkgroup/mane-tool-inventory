<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add/Edit Item - Tool Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div x-data="itemFormApp()" x-init="init()" class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2" x-text="isEditMode ? '✏️ Edit Item' : '➕ Add New Item'"></h1>
            <p class="text-gray-600">Fill in the details below</p>
        </header>

        <!-- Form -->
        <form @submit.prevent="saveItem()" class="bg-white p-6 rounded-lg shadow-md space-y-6">
            <!-- Required Fields Header -->
            <div class="border-b pb-4">
                <h2 class="text-xl font-semibold text-gray-900">Required Information</h2>
            </div>

            <!-- Item Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Item Name <span class="text-red-500">*</span>
                </label>
                <input
                    type="text"
                    x-model="item.name"
                    required
                    placeholder="e.g., Wire Stripper - 8in"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Category -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Category <span class="text-red-500">*</span>
                </label>
                <input
                    type="text"
                    x-model="item.category"
                    list="categories"
                    required
                    placeholder="e.g., Electrical, Power Tools, Carpentry"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
                <datalist id="categories">
                    <template x-for="cat in categories" :key="cat">
                        <option :value="cat"></option>
                    </template>
                </datalist>
            </div>

            <!-- Quantity -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Quantity <span class="text-red-500">*</span>
                </label>
                <input
                    type="number"
                    x-model.number="item.quantity"
                    required
                    min="0"
                    placeholder="0"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Box/Location -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Box/Location <span class="text-red-500">*</span>
                </label>
                <input
                    type="text"
                    x-model="item.box_location"
                    list="boxes"
                    required
                    placeholder="e.g., Truck 1, Shop - Shelf A, Warehouse"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
                <datalist id="boxes">
                    <template x-for="box in boxes" :key="box">
                        <option :value="box"></option>
                    </template>
                </datalist>
                <p class="mt-1 text-sm text-gray-500">
                    Type a new location to create a new box, or select from existing locations
                </p>
            </div>

            <!-- Optional Fields Header -->
            <div class="border-b pb-4 pt-4">
                <h2 class="text-xl font-semibold text-gray-900">Optional Information</h2>
            </div>

            <!-- Brand/Platform -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Brand/Platform
                </label>
                <input
                    type="text"
                    x-model="item.brand_platform"
                    placeholder="e.g., Milwaukee M18, DeWalt 20V Max"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Serial Number -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Serial Number
                </label>
                <input
                    type="text"
                    x-model="item.serial_number"
                    placeholder="e.g., SN-12345"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Estimated Value -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Estimated Value ($)
                </label>
                <input
                    type="number"
                    x-model.number="item.estimated_value"
                    step="0.01"
                    min="0"
                    placeholder="29.99"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Dropbox Manual URL -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Dropbox Manual URL
                </label>
                <input
                    type="url"
                    x-model="item.dropbox_manual_url"
                    placeholder="https://dropbox.com/..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
            </div>

            <!-- Low Stock Threshold -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Low Stock Threshold
                </label>
                <input
                    type="number"
                    x-model.number="item.low_stock_threshold"
                    min="0"
                    placeholder="5"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                >
                <p class="mt-1 text-sm text-gray-500">
                    Item will be highlighted when quantity falls below this value
                </p>
            </div>

            <!-- Image Upload with Mobile Camera Support -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Tool Photo
                </label>
                <div class="flex flex-col gap-4">
                    <!-- Image Preview -->
                    <div x-show="imagePreview" class="w-full">
                        <img
                            :src="imagePreview"
                            alt="Tool preview"
                            class="w-full max-w-sm rounded-lg border border-gray-300"
                        >
                    </div>

                    <!-- File Input with Camera Capture -->
                    <input
                        type="file"
                        accept="image/*"
                        capture="environment"
                        @change="handleImageSelect($event)"
                        class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-lg file:border-0
                            file:text-sm file:font-semibold
                            file:bg-blue-50 file:text-blue-700
                            hover:file:bg-blue-100
                            cursor-pointer"
                    >
                    <p class="text-sm text-gray-500">
                        📸 On mobile: opens camera directly. On desktop: upload from files.
                    </p>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="flex gap-4 pt-4">
                <button
                    type="submit"
                    :disabled="saving"
                    class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span x-show="!saving" x-text="isEditMode ? 'Update Item' : 'Create Item'"></span>
                    <span x-show="saving">Saving...</span>
                </button>
                <a
                    href="/"
                    class="flex-1 px-6 py-3 bg-gray-200 text-gray-700 text-center rounded-lg hover:bg-gray-300 font-semibold"
                >
                    Cancel
                </a>
            </div>
        </form>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Contents - Tool Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div
        x-data="{
            box: null,
            items: [],
            loading: true,
            error: null,

            async init() {
                const boxId = window.location.pathname.split('/').pop();
                if (!boxId) {
                    this.error = 'Invalid container ID';
                    this.loading = false;
                    return;
                }

                try {
                    const response = await fetch(`/api/box/${boxId}`);
                    const data = await response.json();

                    if (response.ok && data.success) {
                        this.box = data.data.box;
                        this.items = data.data.items;
                    } else {
                        this.error = data.detail || 'Container not found';
                    }
                } catch (error) {
                    console.error('Error loading container:', error);
                    this.error = 'Failed to load container details';
                } finally {
                    this.loading = false;
                }
            }
        }"
        x-init="init()"
        class="container mx-auto px-4 py-8"
    >
        <!-- Loading State -->
        <div x-show="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading container contents...</p>
        </div>

        <!-- Error State -->
        <div x-show="!loading && error" class="text-center py-12">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Container Not Found</h2>
            <p class="text-gray-600 mb-6" x-text="error"></p>
            <a href="/" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Return to Inventory
            </a>
        </div>

        <!-- Box Details -->
        <div x-show="!loading && !error">
            <!-- Header -->
            <header class="mb-8">
                <div class="flex items-start justify-between">
                    <div>
                        <p class="text-sm font-medium text-blue-600 uppercase tracking-wider mb-1">Container</p>
                        <h1 class="text-4xl font-bold text-gray-900 mb-2" x-text="box?.name"></h1>
                        <p class="text-lg text-gray-600">
                            Location: <span class="font-semibold" x-text="box?.location"></span>
                            <span x-show="box?.sublocation" class="text-gray-500">
                                &mdash; <span x-text="box?.sublocation"></span>
                            </span>
                        </p>
                    </div>
                    <a href="/" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                        Back
                    </a>
                </div>
            </header>

            <!-- Items Count -->
            <div class="mb-4">
                <p class="text-lg text-gray-700">
                    <span class="font-semibold" x-text="items.length"></span>
                    <span x-text="items.length === 1 ? 'item' : 'items'"></span> in this container
                </p>
            </div>

            <!-- Empty State -->
            <div x-show="items.length === 0" class="bg-white rounded-lg shadow-md p-12 text-center">
                <div class="text-gray-400 text-6xl mb-4">📦</div>
                <h3 class="text-xl font-semibold text-gray-900 mb-2">This container is empty</h3>
                <p class="text-gray-600 mb-6">No items have been added to this container yet.</p>
                <a href="/item-form.html" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Add Item to This Container
                </a>
            </div>

            <!-- Items Grid (Mobile-First Cards) -->
            <div x-show="items.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="item in items" :key="item.id">
                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                        <!-- Item Image -->
                        <div class="aspect-square bg-gray-100 flex items-center justify-center">
                            <img
                                :src="item.image_url || '/images/placeholder.png'"
                                :alt="item.name"
                                class="w-full h-full object-cover"
                                onerror="this.src='/images/placeholder.png'"
                            >
                        </div>

                        <!-- Item Details -->
                        <div class="p-4">
                            <h3 class="font-bold text-lg text-gray-900 mb-1" x-text="item.name"></h3>
                            <p class="text-sm text-gray-600 mb-2" x-text="item.category"></p>

                            <!-- Brand/Platform -->
                            <p x-show="item.brand_platform" class="text-sm text-gray-500 mb-2">
                                <span x-text="item.brand_platform"></span>
                            </p>

                            <!-- Serial Number -->
                            <p x-show="item.serial_number" class="text-xs text-gray-400 mb-2">
                                SN: <span x-text="item.serial_number"></span>
                            </p>

                            <!-- Quantity Badge -->
                            <div class="flex items-center gap-2 mb-3">
                                <span
                                    class="px-3 py-1 text-sm font-semibold rounded-full"
                                    :class="item.low_stock ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'"
                                >
                                    Qty: <span x-text="item.quantity"></span>
                                </span>
                                <span x-show="item.low_stock" class="text-xs text-yellow-600">Low Stock</span>
                            </div>

                            <!-- Manual Link -->
                            <a
                                x-show="item.dropbox_manual_url"
                                :href="item.dropbox_manual_url"
                                target="_blank"
                                class="inline-block w-full text-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
                            >
                                View Manual
                            </a>

                            <!-- Last Updated -->
                            <p class="mt-2 text-xs text-gray-400">
                                Updated: <span x-text="new Date(item.last_updated).toLocaleDateString()"></span>
                            </p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>

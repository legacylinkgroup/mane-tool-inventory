<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Contents - Tool Inventory</title>
    <meta name="description" content="Inventory management system with QR codes for containers and tools">
    <meta name="theme-color" content="#171717">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tool Inventory">
    <script>
      if (localStorage.getItem('darkMode') === 'true' ||
          (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
            popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
            primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
            destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)',
          },
          fontFamily: {
            sans: ['var(--font-sans)'],
            mono: ['var(--font-mono)'],
          },
        }
      }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .no-print, .no-print * { display: none !important; }
            .print-only { display: block !important; }
            .container { max-width: 4in; margin: 0 auto; padding: 0.5in 0; text-align: center; }
        }
    </style>
</head>
<body class="bg-background text-foreground min-h-screen font-sans">
    <!-- Dark Mode Toggle (fixed top-right) -->
    <button onclick="toggleDarkMode()" class="no-print fixed top-4 right-4 z-50 p-2 bg-card text-card-foreground border border-border rounded-lg hover:bg-muted" aria-label="Toggle dark mode">
        <svg class="dark:hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>

    <div
        x-data="{
            box: null,
            items: [],
            loading: true,
            error: null,

            async init() {
                const boxId = window.location.pathname.split('/').pop();
                if (!boxId) {
                    this.error = 'Invalid container ID';
                    this.loading = false;
                    return;
                }

                try {
                    const response = await fetch(`/api/box/${boxId}`);
                    const data = await response.json();

                    if (response.ok && data.success) {
                        this.box = data.data.box;
                        this.items = data.data.items;
                        this.$nextTick(() => {
                            if (this.$refs.qrCanvas) {
                                new QRious({
                                    element: this.$refs.qrCanvas,
                                    value: window.location.href,
                                    size: 200,
                                    backgroundAlpha: 0
                                });
                            }
                        });
                    } else {
                        this.error = data.detail || 'Container not found';
                    }
                } catch (error) {
                    console.error('Error loading container:', error);
                    this.error = 'Failed to load container details';
                } finally {
                    this.loading = false;
                }
            }
        }"
        x-init="init()"
        class="container mx-auto px-4 py-8"
    >
        <!-- Loading State -->
        <div x-show="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
            <p class="mt-4 text-muted-foreground">Loading container contents...</p>
        </div>

        <!-- Error State -->
        <div x-show="!loading && error" class="text-center py-12">
            <h2 class="text-2xl font-bold text-foreground mb-2">Container Not Found</h2>
            <p class="text-muted-foreground mb-6" x-text="error"></p>
            <a href="/" class="inline-block px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:opacity-90">
                Return to Inventory
            </a>
        </div>

        <!-- Box Details -->
        <div x-show="!loading && !error">
            <!-- Header -->
            <header class="mb-8">
                <div class="flex items-start justify-between no-print">
                    <div>
                        <p class="text-sm font-medium text-primary uppercase tracking-wider mb-1">Container</p>
                        <h1 class="text-4xl font-bold text-foreground mb-2" x-text="box?.name"></h1>
                        <p class="text-lg text-muted-foreground">
                            Location: <span class="font-semibold text-foreground" x-text="box?.location"></span>
                            <span x-show="box?.sublocation" class="text-muted-foreground">
                                &mdash; <span x-text="box?.sublocation"></span>
                            </span>
                        </p>
                    </div>
                    <a href="/" class="px-4 py-2 bg-muted text-foreground rounded-lg hover:opacity-80">
                        Back
                    </a>
                </div>

                <!-- QR Code + Print Label -->
                <div class="mt-6 flex flex-col sm:flex-row items-center gap-6 p-6 bg-card rounded-lg border border-border">
                    <div class="flex-shrink-0">
                        <canvas x-ref="qrCanvas" width="200" height="200" class="rounded-lg"></canvas>
                    </div>
                    <div class="text-center sm:text-left">
                        <h2 class="text-2xl font-bold text-foreground" x-text="box?.name"></h2>
                        <p class="text-muted-foreground mt-1">
                            <span x-text="box?.location"></span>
                            <span x-show="box?.sublocation"> &mdash; <span x-text="box?.sublocation"></span></span>
                        </p>
                        <p class="text-xs text-muted-foreground mt-2 no-print">Scan to view container contents</p>
                        <button
                            onclick="window.print()"
                            class="no-print mt-4 inline-flex items-center gap-2 px-5 py-2.5 bg-primary text-primary-foreground rounded-lg hover:opacity-90 text-sm font-medium transition-colors"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            Print Label
                        </button>
                    </div>
                </div>
            </header>

            <!-- Items Count -->
            <div class="mb-4 no-print">
                <p class="text-lg text-foreground">
                    <span class="font-semibold" x-text="items.length"></span>
                    <span x-text="items.length === 1 ? 'item' : 'items'"></span> in this container
                </p>
            </div>

            <!-- Empty State -->
            <div x-show="items.length === 0" class="no-print bg-card rounded-lg shadow-md p-12 text-center">
                <div class="text-muted-foreground text-6xl mb-4">📦</div>
                <h3 class="text-xl font-semibold text-foreground mb-2">This container is empty</h3>
                <p class="text-muted-foreground mb-6">No items have been added to this container yet.</p>
                <a href="/item-form.html" class="inline-block px-6 py-3 bg-primary text-primary-foreground rounded-lg hover:opacity-90">
                    Add Item to This Container
                </a>
            </div>

            <!-- Items Grid (Mobile-First Cards) -->
            <div x-show="items.length > 0" class="no-print grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="item in items" :key="item.id">
                    <div class="bg-card rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                        <!-- Item Image -->
                        <div class="aspect-square bg-muted flex items-center justify-center">
                            <img
                                :src="item.image_url || '/images/placeholder.png'"
                                :alt="item.name"
                                class="w-full h-full object-cover"
                                onerror="this.src='/images/placeholder.png'"
                            >
                        </div>

                        <!-- Item Details -->
                        <div class="p-4">
                            <h3 class="font-bold text-lg text-foreground mb-1" x-text="item.name"></h3>
                            <p class="text-sm text-muted-foreground mb-2" x-text="item.category"></p>

                            <!-- Brand/Platform -->
                            <p x-show="item.brand_platform" class="text-sm text-muted-foreground mb-2">
                                <span x-text="item.brand_platform"></span>
                            </p>

                            <!-- Serial Number -->
                            <p x-show="item.serial_number" class="text-xs text-muted-foreground mb-2">
                                SN: <span x-text="item.serial_number"></span>
                            </p>

                            <!-- Quantity Badge -->
                            <div class="flex items-center gap-2 mb-3">
                                <span
                                    class="px-3 py-1 text-sm font-semibold rounded-full"
                                    :class="item.low_stock ? 'bg-destructive/20 text-destructive' : 'bg-secondary/20 text-secondary'"
                                >
                                    Qty: <span x-text="item.quantity"></span>
                                </span>
                                <span x-show="item.low_stock" class="text-xs text-destructive">Low Stock</span>
                            </div>

                            <!-- Manual Link -->
                            <a
                                x-show="item.dropbox_manual_url"
                                :href="item.dropbox_manual_url"
                                target="_blank"
                                class="inline-block w-full text-center px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:opacity-90 text-sm"
                            >
                                View Manual
                            </a>

                            <!-- Last Updated -->
                            <p class="mt-2 text-xs text-muted-foreground">
                                Updated: <span x-text="new Date(item.last_updated).toLocaleDateString()"></span>
                            </p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
